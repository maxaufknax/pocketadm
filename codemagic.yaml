# PocketADM — no-Mac iOS release pipeline (Codemagic)
# ---------------------------------------------------------------------------
# Builds the Capacitor client on a Codemagic macOS VM, signs it automatically
# with an App Store Connect API key (no Mac, no manual certificates), and ships
# it to TestFlight. Everything the build needs that only exists on macOS
# (CocoaPods, Xcode, the iOS project itself) is produced here at build time.
#
# ONE-TIME SETUP (in the Codemagic web UI — see client/APPSTORE.md):
#   1. Connect this Git repo.
#   2. Team settings → Integrations → App Store Connect → add your API key,
#      and name it exactly:  PocketADM ASC key   (matches `integrations` below).
#   3. Add a secure env var CERTIFICATE_PRIVATE_KEY_B64 (base64 of an RSA private
#      key) to the ios-release group — the distribution cert's private key, which
#      Apple's API can't hand out. See APPSTORE.md §Signing for how to generate it.
#   4. Start the "ios-release" workflow. First build → TestFlight.
# When you're ready for the public release, flip submit_to_app_store to true.
# ---------------------------------------------------------------------------

workflows:
  ios-release:
    name: PocketADM iOS (TestFlight + App Store)
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: client
    integrations:
      app_store_connect: PocketADM ASC key
    environment:
      # NOTE: no `ios_signing:` block here on purpose. That block only *fetches*
      # existing provisioning profiles and fails on a fresh app ("No matching
      # profiles found"). Instead the "Set up code signing" script below fetches
      # AND creates the distribution certificate + profile via --create.
      vars:
        BUNDLE_ID: "de.maxaufknax.pocketadm"
        TEAM_ID: "ZPF4QUFXXH"            # Apple Developer Team ID (App ID prefix)
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        MARKETING_VERSION: "1.0.0"       # public App Store version string
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS dependencies
        script: npm ci || npm install

      - name: Bundle the PWA into the native shell
        script: npm run sync-web        # copies ../web -> ./www (strips sw.js)

      - name: Create the iOS platform if it isn't committed yet
        script: |
          if [ ! -d "ios/App" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Generate app icons & splash from assets/
        script: |
          npx @capacitor/assets generate --ios --assetPath assets || \
            echo "asset generation skipped (assets/ missing) — using template icons"

      - name: Apply native iOS configuration (Info.plist)
        script: bash scripts/ios-configure.sh

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install

      - name: Set the version and a monotonic build number
        script: |
          cd ios/App
          agvtool new-marketing-version "$MARKETING_VERSION"
          agvtool new-version -all "$(date +%Y%m%d%H%M)"

      - name: Set up code signing (create cert + profile, pin team)
        script: |
          set -eo pipefail
          # Apple's API can create/return a distribution certificate but NEVER its
          # private key — that has to be supplied. Without it fetch-signing-files
          # fails with "Cannot save Signing Certificates without certificate
          # private key" and produces no cert AND no profile. Supply a persistent
          # key stored ONCE as a base64 secure env var in Codemagic (see
          # client/APPSTORE.md §Signing). Reusing the same key every build means
          # no new certificate is created (Apple caps distribution certs).
          if [ -z "${CERTIFICATE_PRIVATE_KEY_B64:-}" ]; then
            echo "!! CERTIFICATE_PRIVATE_KEY_B64 is not set. Add it as a secure env"
            echo "!! variable in Codemagic (ios-release group) — see APPSTORE.md §Signing."
            exit 1
          fi
          echo "$CERTIFICATE_PRIVATE_KEY_B64" | base64 --decode > /tmp/cert_key.pem

          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          xcode-project use-profiles

          # Belt-and-suspenders: a freshly generated Capacitor project defaults to
          # automatic signing with an empty team, so pin every manual-signing
          # setting (team, style, specifier, identity) onto the App target from
          # the profile we just fetched. Fail loudly if no profile was produced
          # rather than writing a bogus specifier.
          PROFILE=$(ls -t "$HOME/Library/MobileDevice/Provisioning Profiles/"*.mobileprovision 2>/dev/null | head -n1 || true)
          if [ -z "$PROFILE" ] || [ ! -f "$PROFILE" ]; then
            echo "!! No provisioning profile was fetched — check the ASC API key"
            echo "!! permissions (App Manager) and CERTIFICATE_PRIVATE_KEY_B64."
            exit 1
          fi
          security cms -D -i "$PROFILE" -o /tmp/pp.plist
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/pp.plist)
          export PROFILE_NAME
          echo "Using provisioning profile: $PROFILE_NAME"
          ruby -e '
            require "xcodeproj"
            proj = Xcodeproj::Project.open("ios/App/App.xcodeproj")
            proj.targets.each do |t|
              next unless t.name == "App"
              t.build_configurations.each do |c|
                c.build_settings["DEVELOPMENT_TEAM"] = ENV["TEAM_ID"]
                c.build_settings["CODE_SIGN_STYLE"] = "Manual"
                c.build_settings["PROVISIONING_PROFILE_SPECIFIER"] = ENV["PROFILE_NAME"]
                c.build_settings["CODE_SIGN_IDENTITY"] = "Apple Distribution"
                c.build_settings["CODE_SIGN_IDENTITY[sdk=iphoneos*]"] = "Apple Distribution"
              end
            end
            proj.save
          '

      - name: Build the signed IPA
        script: |
          set +e
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
          status=$?
          if [ $status -ne 0 ]; then
            echo "═══════ build-ipa failed (exit $status) — real xcodebuild error below ═══════"
            log=$(ls -t /tmp/xcodebuild_logs/*.log 2>/dev/null | head -n1)
            if [ -n "$log" ]; then
              echo ">> log file: $log"
              echo "───────── error / signing lines ─────────"
              grep -nE "error:|fatal error|The following build commands failed|Signing for|requires a provisioning|No profile|no matching|certificate|does not support|deployment target|Undefined symbol|linker command failed|PhaseScriptExecution" "$log" | tail -n 100
              echo "───────── last 200 log lines ─────────"
              tail -n 200 "$log"
            else
              echo "!! no xcodebuild log found under /tmp/xcodebuild_logs"
            fi
            exit $status
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # Ready for the public store? Flip this to true (and set the group/notes).
        submit_to_app_store: false
