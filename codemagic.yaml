# PocketADM — no-Mac iOS release pipeline (Codemagic)
# ---------------------------------------------------------------------------
# Builds the Capacitor client on a Codemagic macOS VM, signs it automatically
# with an App Store Connect API key (no Mac, no manual certificates), and ships
# it to TestFlight. Everything the build needs that only exists on macOS
# (CocoaPods, Xcode, the iOS project itself) is produced here at build time.
#
# ONE-TIME SETUP (in the Codemagic web UI — see client/APPSTORE.md):
#   1. Connect this Git repo.
#   2. Team settings → Integrations → App Store Connect → add your API key,
#      and name it exactly:  PocketADM ASC key   (matches `integrations` below).
#   3. Add a secure env var CERTIFICATE_PRIVATE_KEY_B64 (base64 of an RSA private
#      key) to the ios-release group — the distribution cert's private key, which
#      Apple's API can't hand out. See APPSTORE.md §Signing for how to generate it.
#   4. Start the "ios-release" workflow. First build → TestFlight.
# This workflow ships to TestFlight only (submit_to_testflight: true,
# submit_to_app_store: false) — a green build can NEVER disturb a pending App
# Review. Flip submit_to_app_store to true by hand only for the build you
# actually mean to release. See the publishing block at the bottom.
# ---------------------------------------------------------------------------

workflows:
  ios-release:
    name: PocketADM iOS (TestFlight + App Store)
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: client
    integrations:
      app_store_connect: PocketADM ASC key
    environment:
      # NOTE: no `ios_signing:` block here on purpose. That block only *fetches*
      # existing provisioning profiles and fails on a fresh app ("No matching
      # profiles found"). Instead the "Set up code signing" script below fetches
      # AND creates the distribution certificate + profile via --create.
      groups:
        - ios-release          # holds the secure var CERTIFICATE_PRIVATE_KEY_B64
      vars:
        BUNDLE_ID: "de.maxaufknax.pocketadm"
        TEAM_ID: "ZPF4QUFXXH"            # Apple Developer Team ID (App ID prefix)
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        MARKETING_VERSION: "1.0.0"       # public App Store version string
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install JS dependencies
        script: npm ci || npm install

      - name: Bundle the PWA into the native shell
        script: npm run sync-web        # copies ../web -> ./www (strips sw.js)

      - name: Create the iOS platform if it isn't committed yet
        script: |
          if [ ! -d "ios/App" ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Generate app icons & splash, and guarantee opaque icons
        script: |
          set -eo pipefail
          # Generate from assets/. Do NOT swallow failures: a missing or invalid
          # AppIcon is a top cause of App Store *processing* rejections (the
          # binary uploads fine, then Apple drops the build and emails you).
          npx @capacitor/assets generate --ios --assetPath assets
          ICONSET="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          [ -d "$ICONSET" ] || { echo "!! $ICONSET missing — icon generation failed"; exit 1; }
          # App Store rejects any icon with an alpha channel (ITMS-90717).
          # @capacitor/assets can emit RGBA PNGs even from an RGB source, so
          # flatten every icon to opaque. sips has no direct "remove alpha", but
          # a round-trip through a format without alpha (BMP) drops it reliably.
          find "$ICONSET" -name '*.png' -print0 | while IFS= read -r -d '' png; do
            sips -s format bmp "$png" --out "/tmp/_icon.bmp" >/dev/null
            sips -s format png "/tmp/_icon.bmp" --out "$png" >/dev/null
          done
          # Sanity: the 1024 marketing icon must exist and now be opaque.
          MARKETING=$(find "$ICONSET" \( -name '*1024*' -o -name '*512@2x*' \) -name '*.png' | head -n1)
          [ -n "$MARKETING" ] || { echo "!! no 1024 marketing icon in $ICONSET"; exit 1; }
          echo "✓ icons generated + flattened to opaque; marketing icon: $(basename "$MARKETING")"
          sips -g hasAlpha "$MARKETING" || true

      - name: Apply native iOS configuration (Info.plist)
        script: bash scripts/ios-configure.sh

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App && pod install

      - name: Set the version and a monotonic build number
        script: |
          cd ios/App
          agvtool new-marketing-version "$MARKETING_VERSION"
          agvtool new-version -all "$(date +%Y%m%d%H%M)"

      - name: Set up code signing (create cert + profile from key)
        script: |
          set -eo pipefail
          # Apple's API can create/return a distribution certificate but NEVER its
          # private key — that has to be supplied. Without it fetch-signing-files
          # fails with "Cannot save Signing Certificates without certificate
          # private key" and produces no cert AND no profile. Supply a persistent
          # key stored ONCE as a base64 secure env var in Codemagic (see
          # client/APPSTORE.md §Signing). Reusing the same key every build means
          # no new certificate is created (Apple caps distribution certs).
          if [ -z "${CERTIFICATE_PRIVATE_KEY_B64:-}" ]; then
            echo "!! CERTIFICATE_PRIVATE_KEY_B64 is not set. Add it as a secure env"
            echo "!! variable in Codemagic (ios-release group) — see APPSTORE.md §Signing."
            exit 1
          fi
          printf '%s' "$CERTIFICATE_PRIVATE_KEY_B64" | openssl base64 -d -A -out /tmp/cert_key.pem

          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key @file:/tmp/cert_key.pem \
            --create
          keychain add-certificates
          # use-profiles writes the fetched profile onto BOTH the App target's
          # Debug/Release build configs (manual style, team, specifier, Apple
          # Distribution identity) AND generates export_options.plist. Once the
          # cert + profile actually exist (they do now, thanks to the key above),
          # this fully configures signing — no manual xcodeproj patching needed.
          xcode-project use-profiles

      - name: Build the signed IPA
        script: |
          set +e
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
          status=$?
          if [ $status -ne 0 ]; then
            echo "═══════ build-ipa failed (exit $status) — real xcodebuild error below ═══════"
            log=$(ls -t /tmp/xcodebuild_logs/*.log 2>/dev/null | head -n1)
            if [ -n "$log" ]; then
              echo ">> log file: $log"
              echo "───────── error / signing lines ─────────"
              grep -nE "error:|fatal error|The following build commands failed|Signing for|requires a provisioning|No profile|no matching|certificate|does not support|deployment target|Undefined symbol|linker command failed|PhaseScriptExecution" "$log" | tail -n 100
              echo "───────── last 200 log lines ─────────"
              tail -n 200 "$log"
            else
              echo "!! no xcodebuild log found under /tmp/xcodebuild_logs"
            fi
            exit $status
          fi

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        # TestFlight only. Flip to true ONLY on the build you actually mean to
        # release, and bump MARKETING_VERSION with it.
        #
        # Why it is false while a version sits in App Review: a build and an App
        # Store version are separate records. The submitted version has its build
        # pinned, and a fresh upload does not attach itself to it -- so uploading
        # to TestFlight mid-review is safe and leaves the queue position alone.
        # `submit_to_app_store: true` is what breaks that: it creates a *second*
        # submission for the same MARKETING_VERSION, which either errors out or
        # pulls the pending build back out of review. Build numbers come from
        # `date +%Y%m%d%H%M`, so parallel TestFlight builds never collide with
        # the one under review -- only this flag does.
        submit_to_app_store: false
