# Compose project name is pinned so the stack keeps the same container name and
# data volume (helmsman_helmsman_data) even if this directory is renamed
# (e.g. helmsman -> pocketadm). Renaming the folder is then safe: no data loss,
# and dependents that address the container by name (npm, hub-landing) keep working.
name: helmsman

services:
  helmsman:
    build: .
    image: helmsman:latest
    container_name: helmsman
    restart: unless-stopped
    ports:
      # Bind to loopback by DEFAULT. This container is root-on-host (Docker
      # socket + `/:/host` + host shell), so its raw port must never answer the
      # open internet — put a reverse proxy in front of it. A proxy on the same
      # host reaches it by container name over a shared Docker network (that's
      # how the bundled setup works), so loopback costs you nothing there.
      # Need to publish it directly (no proxy, LAN access)? Set HELMSMAN_BIND=0.0.0.0
      # — and then turn on 2FA, because you've just put a root shell on the wire.
      - "${HELMSMAN_BIND:-127.0.0.1}:${HELMSMAN_PORT:-8090}:8080"
    environment:
      # - ADMIN_PASSWORD=change-me          # otherwise auto-generated on first run (see logs)
      # - AI_PROVIDER=anthropic             # anthropic | openrouter | openai (or set via UI)
      # - AI_API_KEY=sk-...
      # - AI_MODEL=claude-sonnet-5
      # - HOST_SSH=user@172.17.0.1          # optional: real host shell in the terminal
      - HELMSMAN_WORKDIR=/host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /:/host                          # host filesystem, read-only (metrics + AI context)
      - helmsman_data:/data
      # - ~/.ssh:/root/.ssh:ro              # optional: for HOST_SSH key auth

volumes:
  helmsman_data:
