# Deploy with:  docker compose -f docker-compose.demo.yml up -d --build
#
# The --build matters. This file pairs `build: .` with an `image:` tag, and
# compose only builds when that tag is missing locally -- so a plain `up -d`
# will happily (re)start whatever image already carries the tag and never look
# at the source. That is exactly how the public demo once ended up serving a
# months-old build whose terminal had no demo guard. The tag below is a local
# build artifact on purpose: it must never name a remote registry path, or a
# stale pull can silently become the demo.
services:
  helmsman-demo:
    build: .
    image: pocketadm-demo:local
    container_name: helmsman-demo
    restart: unless-stopped
    ports:
      - "${HELMSMAN_PORT:-8091}:8080"
    environment:
      - HELMSMAN_DEMO=1        # public read-only playground; password is "demo"
    # NOTE: no docker.sock / host mount — demo mode serves canned sample data,
    # so a public demo can't touch a real host. It is also NOT on the main
    # homeserver network: the only network it shares with the reverse proxy is
    # the dedicated "demoedge" below, so a demo visitor can never reach the
    # real internal services (vaultwarden, databases, Ollama, …). Defense in
    # depth on top of the app-level demo guards (terminal is simulated, every
    # mutation is blocked, no AI provider is reachable).
    mem_limit: 512m
    cpus: 1.5
    pids_limit: 256
    volumes:
      - helmsman_demo_data:/data
    networks:
      - default        # the demo's own private bridge (outbound only)
      - demoedge       # shared ONLY with the reverse proxy

volumes:
  helmsman_demo_data:

networks:
  # A tiny network whose only members are this demo and the reverse proxy.
  # Create the proxy side once:  docker network connect pocketadm_demoedge nginx-proxy-manager
  demoedge:
    name: pocketadm_demoedge
